<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patriot Mechanical — Login</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: Arial, sans-serif;
            background: #0f172a;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: #e5e7eb;
        }

        .login-card {
            background: #1f2937;
            border-radius: 16px;
            padding: 48px 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
        }

        .logo {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo h1 {
            font-size: 24px;
            font-weight: 700;
            color: #f9fafb;
        }

        .logo p {
            font-size: 13px;
            color: #6b7280;
            margin-top: 4px;
        }

        label {
            display: block;
            font-size: 13px;
            color: #9ca3af;
            margin-bottom: 6px;
        }

        input {
            width: 100%;
            background: #111827;
            border: 1px solid #374151;
            color: #f9fafb;
            padding: 12px 14px;
            border-radius: 8px;
            font-size: 15px;
            margin-bottom: 16px;
            transition: border-color 0.15s;
            font-family: inherit;
        }

        input:focus {
            outline: none;
            border-color: #3b82f6;
        }

        button {
            width: 100%;
            background: #3b82f6;
            color: white;
            border: none;
            padding: 13px;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 4px;
            transition: background 0.15s;
        }

        button:hover { background: #2563eb; }
        button:disabled { background: #374151; cursor: not-allowed; }

        .error {
            background: #7f1d1d;
            border: 1px solid #ef4444;
            color: #fca5a5;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 16px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo">
            <h1>Patriot Mechanical</h1>
            <p>Internal Operations Dashboard</p>
        </div>

        <div class="error" id="errorMsg"></div>

        <label>Email</label>
        <input type="email" id="email" placeholder="you@patriotmechanical.com" autocomplete="email" />

        <label>Password</label>
        <input type="password" id="password" placeholder="Password" autocomplete="current-password" />

        <button id="loginBtn" onclick="login()">Sign In</button>
    </div>

    <script>
        // If already logged in, go straight to dashboard
        fetch('/auth/me').then(r => {
            if (r.ok) window.location.href = '/';
        }).catch(() => {});

        document.getElementById('password').addEventListener('keydown', e => {
            if (e.key === 'Enter') login();
        });

        async function login() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const btn = document.getElementById('loginBtn');
            const err = document.getElementById('errorMsg');

            if (!email || !password) {
                showError('Please enter your email and password.');
                return;
            }

            btn.disabled = true;
            btn.innerText = 'Signing in...';
            err.style.display = 'none';

            try {
                const res = await fetch('/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password }),
                    credentials: 'include'
                });

                if (res.ok) {
                    window.location.href = '/';
                } else {
                    const data = await res.json().catch(() => ({}));
                    showError(data.message || 'Invalid email or password.');
                    btn.disabled = false;
                    btn.innerText = 'Sign In';
                }
            } catch {
                showError('Could not connect to server.');
                btn.disabled = false;
                btn.innerText = 'Sign In';
            }
        }

        function showError(msg) {
            const err = document.getElementById('errorMsg');
            err.innerText = msg;
            err.style.display = 'block';
        }
    </script>
</body>
</html>
